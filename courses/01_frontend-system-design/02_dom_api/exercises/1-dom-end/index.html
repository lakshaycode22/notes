<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Frontend System Design Fundamentals</title>
    <link rel="stylesheet" href="./index.css" />
    <template id="card_template">
      <article class="card">
        <h3 class="card__title"></h3>
        <div class="card__body">
          <div class="card__body__image"></div>
          <section class="card__body__content"></section>
        </div>
      </article>
    </template>
  </head>
  <body>
    <main id="container"></main>
  </body>
  <script>
    const container = document.getElementById("container");
    const template = document.getElementById("card_template");
    /**
     * @param {string} title
     * @param {string} body
     *
     * @return {HTMLElement
     */
    function createCardComponent(title, body) {
      // @todo - Implement function
      const card = template.content.cloneNode(true).firstElementChild;
      const headingElement = card.querySelector("h3");
      headingElement.textContent = title;
      const sectionElement = card.querySelector(".card__body__content");
      sectionElement.textContent = body;
      return card;
    }

    const component = createCardComponent(
      "Frontend System Design: Fundamentals",
      "This is a random body text",
    );

    container.appendChild(component);

    // When we are using the template and creating a clone of that template.
    // That template is not actually present in the DOM.
    // Hence any operation won't trigger a reflow.
    // Only reflow triggered here is when me appendChild finally in the container.
    // Template is also stored in memory.
  </script>
</html>
